name: Build Debian package

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ruby \
            shellcheck \
            ca-certificates
          sudo gem install rubocop --no-document

      - name: Run unit tests
        run: ruby -Itest test/test_sayip_utils.rb

      - name: Run RuboCop
        run: rubocop lib/sayip/utils.rb sayip-node-utils.rb test/test_sayip_utils.rb

      - name: Run ShellCheck
        run: shellcheck debian/postinst debian/postrm debian/prerm debian/config

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            debhelper \
            fakeroot \
            ruby \
            ca-certificates

      - name: Build package
        run: |
          set -eux
          dpkg-buildpackage -us -uc -b

          mkdir -p dist
          mv -v ../*.deb dist/
          (cd dist && sha256sum *.deb > SHA256SUMS)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: |
            dist/*.deb
            dist/SHA256SUMS
